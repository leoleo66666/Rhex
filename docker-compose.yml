services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bbs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bbs"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  setup:
    build: .
    restart: "no"
    command: setup
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/bbs?schema=public"
      REDIS_URL: "redis://redis:6379"
      SESSION_SECRET: "${SESSION_SECRET:-change-me-to-a-random-string-at-least-32-chars}"
      CAPTCHA_SECRET_KEY: "${CAPTCHA_SECRET_KEY:-change-me-to-a-random-string-at-least-32-chars}"
      SEED_ADMIN_USERNAME: "${SEED_ADMIN_USERNAME:-admin}"
      SEED_ADMIN_PASSWORD: "${SEED_ADMIN_PASSWORD:-ChangeMe_123456}"
      SEED_ADMIN_EMAIL: "${SEED_ADMIN_EMAIL:-admin@example.com}"
      SEED_ADMIN_NICKNAME: "${SEED_ADMIN_NICKNAME:-管理员}"

  web:
    build: .
    restart: unless-stopped
    command: web
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/bbs?schema=public"
      REDIS_URL: "redis://redis:6379"
      REDIS_KEY_PREFIX: "rhex"
      SESSION_SECRET: "${SESSION_SECRET:-change-me-to-a-random-string-at-least-32-chars}"
      CAPTCHA_SECRET_KEY: "${CAPTCHA_SECRET_KEY:-change-me-to-a-random-string-at-least-32-chars}"
      BACKGROUND_JOB_WEB_RUNTIME: "${BACKGROUND_JOB_WEB_RUNTIME:-worker-only}"
    volumes:
      - uploads:/app/uploads

  worker:
    build: .
    restart: unless-stopped
    command: worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/bbs?schema=public"
      REDIS_URL: "redis://redis:6379"
      REDIS_KEY_PREFIX: "rhex"
      SESSION_SECRET: "${SESSION_SECRET:-change-me-to-a-random-string-at-least-32-chars}"
      CAPTCHA_SECRET_KEY: "${CAPTCHA_SECRET_KEY:-change-me-to-a-random-string-at-least-32-chars}"

volumes:
  pgdata:
  redisdata:
  uploads:
